services:
  # IMPORTANT: OCR requires Docker (tesseract-ocr is installed in the Dockerfile).
  # If you see "OCR unavailable" in logs, your Render service is on Native Python —
  # switch Settings → Runtime/Language → Docker and redeploy.
  - type: web
    name: arcus-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: TESSERACT_CMD
        value: /usr/bin/tesseract
      # Optional but strongly recommended — free key at https://ocr.space/ocrapi
      - key: OCR_SPACE_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ARCUS_COMPANY_ID
        sync: false
